<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart product</title>
    <link rel="stylesheet" href="./node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        .product {
            display: grid;
            grid-template-columns: 3fr 9fr;
            font-family: arial;
        }

        .bread-crumb {
            list-style: none;
            margin-left: -40px;

        }

        .bread-crumb li {
            display: inline;

        }

        .bread-crumb ::after {
            content: " > ";
            font-size: 12px;
            font-weight: bold;
            padding-right: 5px;
            padding-left: 5px;

        }

        .title {
            font-size: 30px;
        }

        .rating {
            background-color: green;
            width: 40px;
            color: white;
            text-align: center;
        }

        .amount {
            font-size: 30px;
            font-weight: bold;

        }

        .offers {
            list-style: none;
            margin-left: -40px;

        }

        .offers span {
            color: grey;
        }

        .bi-tag-fill {
            color: green;
        }
    </style>
</head>

<body>
    <div class="product">
        <img src="Public/images/iphoine.png" alt="Iphone 16" height="450px">
        <div>
            <ul class="bread-crumb">
                <li>Home</li>
                <li>Mobiles & Accessories</li>
                <li>Mobiles</li>
                <li>Apple</li>
                <li>Iphone</li>
            </ul>
            <div class="title">Apple iphone 16 ( White,128 GB)</div>
            <div class="rating">4.6<span class="bi bi-star-fill"></span></div><br>

            <div class="amount"> &#8377;6,242/month</div>12 months No Cost EMI Plan with Bajaj Finserv <br> <br>
            <b>
                <font color="green">Extra &#8377 5000 Off</font>
            </b>
            <br><br>

            <b>
                <font size="6">74,900</font>
            </b>&nbsp;<strike>
                <font color="grey">&#8377 79,900</font>
            </strike> &nbsp; <b>
                <font color="green">6% off</font>
            </b>
            <h4>Available offers</h4>
            <ul class="offers">
                <li class="bi bi-tag-fill"><span> Bank</span></li><br>
                <li class="bi bi-tag-fill"><span> 4000</span></li><br>
                <li class="bi bi-tag-fill"><span> ICICI</span></li><br>
                <li class="bi bi-tag-fill"><span> price</span></li><br>
            </ul>















        </div>








    </div>


    </div>

</body>

</html>
